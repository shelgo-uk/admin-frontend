name: Deploy Admin

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npx ng build --configuration production

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "dist/"
          target: "/var/www/admin/"
          rm: true

      - name: Fix Nginx root & reload
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo '{"APIUrl":"https://api.shelgo.uk/api/"}' > /var/www/admin-config.json
            DIST_DIR=$(ls /var/www/admin/dist/ | head -1)
            echo "Admin dist: $DIST_DIR"
            sed -i "s|root /var/www/admin/dist/.*/browser;|root /var/www/admin/dist/${DIST_DIR}/browser;|g" /etc/nginx/sites-available/shelgo.conf
            cp /var/www/admin-config.json /var/www/admin/dist/${DIST_DIR}/browser/assets/configuration.json
            nginx -t && systemctl reload nginx
            echo "Admin deployed successfully"
