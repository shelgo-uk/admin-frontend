<main>
    <div class="popup-main">
        <div class="popup-head">
            <div class="popup-head-ttl">
                <span class="popup-head-icon">
                    <span><i [class]="isEdit ? 'fa-light fa-pen-to-square' : 'fa-light fa-user-plus'"></i></span>
                </span>
                {{ isEdit ? 'Update' : 'Add' }} Customer
            </div>
            <div class="popup-head-btn">
                <button (click)="activeModal.close()" [ngbTooltip]="'Close'">
                    <span><i class="fa-light fa-xmark"></i></span>
                </button>
            </div>
        </div>
        <div class="popup-body">
            <div class="row m-0 p-0">
                <div class="col-lg-6 col-12 mb-2">
                    <div class="form-inp-main">
                        <label class="form-label">First Name <sup>*</sup></label>
                        <input class="form-control" type="text" placeholder="First Name" [(ngModel)]="model.firstName" />
                    </div>
                </div>
                <div class="col-lg-6 col-12 mb-2">
                    <div class="form-inp-main">
                        <label class="form-label">Last Name <sup>*</sup></label>
                        <input class="form-control" type="text" placeholder="Last Name" [(ngModel)]="model.lastName" />
                    </div>
                </div>
                <div class="col-lg-6 col-12 mb-2">
                    <div class="form-inp-main">
                        <label class="form-label">Email <sup>*</sup></label>
                        <input class="form-control" type="email" placeholder="Email Address" [(ngModel)]="model.email" />
                    </div>
                </div>
                <div class="col-lg-6 col-12 mb-2">
                    <div class="form-inp-main">
                        <label class="form-label">Mobile</label>
                        <input class="form-control" type="text" placeholder="Mobile Number" [(ngModel)]="model.mobile" />
                    </div>
                </div>
                <div class="col-lg-6 col-12 mb-2" *ngIf="!isEdit">
                    <div class="form-inp-main">
                        <label class="form-label">Password <sup>*</sup></label>
                        <div class="form-control-with-icon">
                            <input class="form-control" [type]="passVisible ? 'text' : 'password'"
                                placeholder="Password" [(ngModel)]="model.password" />
                            <span class="form-icon" (click)="passVisible = !passVisible">
                                <span><i [class]="passVisible ? 'fa-light fa-eye-slash' : 'fa-light fa-eye'"></i></span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 col-12 mb-2">
                    <div class="form-inp-main">
                        <label class="form-label">Date of Birth</label>
                        <input class="form-control" type="date" [(ngModel)]="model.dateOfBirth" />
                    </div>
                </div>
            </div>
        </div>
        <div class="popup-footer">
            <button type="button" class="site-btn grey-color" (click)="activeModal.close()">
                <span class="site-btn-icon"><span><i class="fa-light fa-xmark"></i></span></span>
                Cancel
            </button>
            <button type="button" class="site-btn primary-color ms-2" (click)="validateData()" [disabled]="isSubmitting">
                <span class="site-btn-icon">
                    <span><i *ngIf="!isSubmitting" [class]="isEdit ? 'fa-light fa-floppy-disk' : 'fa-light fa-plus'"></i>
                    <i *ngIf="isSubmitting" class="fa-light fa-spinner-third fa-spin"></i></span>
                </span>
                {{ isSubmitting ? 'Saving...' : (isEdit ? 'Update Customer' : 'Add Customer') }}
            </button>
        </div>
    </div>
</main>
